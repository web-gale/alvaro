name: 🔄 IPTV Auto-Update

on:
  schedule:
    # Ejecuta cada 6 horas
    - cron: '0 */6 * * *'
  
  # Permite ejecutar manualmente
  workflow_dispatch:
    inputs:
      channels:
        description: 'Canales a actualizar (ej: Telefuturo.py@SD,Trece.py@SD) o "all" para todos'
        required: false
        default: 'all'

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          playwright install chromium

      - name: 🚀 Ejecutar IPTV Scraper
        run: |
          cd scripts
          if [ "${{ github.event.inputs.channels }}" = "" ] || [ "${{ github.event.inputs.channels }}" = "all" ]; then
            echo "📺 Actualizando todos los canales..."
            python iptv_scraper.py ../prueba01.m3u --update-all
          else
            echo "📺 Actualizando canales: ${{ github.event.inputs.channels }}"
            python iptv_scraper.py ../prueba01.m3u --update ${{ github.event.inputs.channels }}
          fi

      - name: 📤 Push de cambios (si existen)
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { execSync } = require('child_process');
              execSync('git config user.email "iptv-bot@github.com"');
              execSync('git config user.name "IPTV Auto-Bot"');
              
              const status = execSync('git status --short', { encoding: 'utf8' });
              if (status.includes('prueba01.m3u')) {
                execSync('git add prueba01.m3u');
                execSync('git commit -m "🔄 [AUTO] Actualización de enlaces IPTV con tokens frescos"');
                execSync('git push');
                console.log('✅ Push completado');
              } else {
                console.log('⏭️  Sin cambios para commitear');
              }
            } catch (error) {
              console.log('⚠️  Advertencia en commit/push:', error.message);
            }

      - name: 📧 Notificación de resultado
        if: always()
        run: |
          echo "✅ Workflow completado"
          echo "📝 Logs disponibles en Actions"
