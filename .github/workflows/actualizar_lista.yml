name: Auto Actualizar Canales Alvaro01

on:
  schedule:
    # Se ejecuta automáticamente cada 2 horas de forma silenciosa
    - cron: '0 */2 * * *'
  # Te permite activar el script manualmente desde el botón "Run workflow" en la web de GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia los archivos de tu repositorio al servidor virtual de GitHub
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    # 2. Prepara el entorno de Python en el servidor
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. Instala Playwright y descarga el navegador Chromium silencioso
    - name: Instalar dependencias necesarias
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium

    # 4. Corre tu script de cacería para parchar las URLs de Alvaro01.m3u
    - name: Ejecutar script de extracción
      run: python cazador_maestro.py

    # 5. Verifica si hubo cambios con los tokens y los sube de vuelta a tu GitHub
    - name: Guardar y subir cambios de vuelta a GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Alvaro01.m3u
        # El comando solo hace commit si el archivo realmente cambió, protegiendo tu historial
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Update: Tokens deportivos y entretenimiento actualizados" && git push)
