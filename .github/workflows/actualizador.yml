name: Actualizador Automatizado IPTV-ORG

on:
  schedule:
    # Se ejecuta de manera automática cada 6 horas
    - cron: '0 */3 * * *'
  workflow_dispatch: # Permite activarlo manualmente

jobs:
  combinador-iptv:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar Repositorio
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Inicializar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Extractor de IPTV-ORG (Sin Duplicados)
      run: |
        python fusionador_org.py

    - name: Verificar y Guardar en Alvaro01.m3u
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Detecta cambios específicamente en tu nuevo archivo m3u
        if ! git diff --exit-code Alvaro01.m3u; then
          git add Alvaro01.m3u
          git commit -m "🤖 Sincronización automática en Alvaro01.m3u sin duplicados"
          git push
        else
          echo "No se detectaron cambios en los canales de iptv-org."
        fi
