name: Actualizar IPTV

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py --m3u-file prueba.m3u

      - name: Commit and push if changed
        run: |
          git config user.name "iptv-updater-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- prueba.m3u; then
            echo "Sin cambios"
          else
            git add prueba.m3u
            git commit -m "chore: actualizar prueba.m3u"
            git push
          fi